<style>

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Lato',sans-serif;
  background:#0D1B2A;
  color:#FFFFFF;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow-x:hidden;
  position:relative;
}

/* Grain overlay */
body::after{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.06;
  z-index:1000;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:128px 128px;
}

canvas#particles{
  position:fixed;
  inset:0;
  z-index:0;
  width:100%;
  height:100%;
}

.container{
  position:relative;
  z-index:1;
  width:100%;
  max-width:420px;
  padding:48px 24px 32px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

.logo{
  max-width:220px;
  width:80%;
  opacity:0;
  transform:translateY(-20px);
  animation:fadeSlideDown .8s ease forwards;
}

.tagline{
  font-family:'Lato',sans-serif;
  font-weight:300;
  font-size:11px;
  letter-spacing:3.5px;
  text-transform:uppercase;
  color:#4A9BC4;
  text-align:center;
  line-height:1.6;
  opacity:0;
  transform:translateY(-12px);
  animation:fadeSlideDown .8s ease .25s forwards;
}

.btn-group{
  display:flex;
  flex-direction:column;
  gap:14px;
  width:100%;
  margin-top:8px;
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  width:100%;
  padding:16px 24px;
  border:1.5px solid rgba(201,168,76,.35);
  border-radius:12px;
  background:rgba(13,27,42,.6);
  backdrop-filter:blur(6px);
  color:#FFFFFF;
  font-family:'Bebas Neue',sans-serif;
  font-size:18px;
  letter-spacing:2px;
  text-decoration:none;
  text-transform:uppercase;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:transform .25s ease,box-shadow .35s ease,border-color .35s ease;
  opacity:0;
  transform:translateY(18px);
}

.btn:nth-child(1){animation:fadeSlideUp .7s ease .45s forwards}
.btn:nth-child(2){animation:fadeSlideUp .7s ease .6s forwards}
.btn:nth-child(3){animation:fadeSlideUp .7s ease .75s forwards}

.btn svg{width:22px;height:22px;flex-shrink:0;fill:currentColor}

.btn--yt:hover{
  transform:translateY(-4px);
  border-color:#FF0000;
  box-shadow:0 8px 28px rgba(255,0,0,.25);
}
.btn--tt:hover{
  transform:translateY(-4px);
  border-color:#00f2ea;
  box-shadow:0 8px 28px rgba(0,242,234,.25);
}
.btn--ig:hover{
  transform:translateY(-4px);
  border-color:#E1306C;
  box-shadow:0 8px 28px rgba(225,48,108,.25);
}

.ripple{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,.3);
  transform:scale(0);
  animation:rippleAnim .6s ease forwards;
  pointer-events:none;
}

@keyframes rippleAnim{
  to{transform:scale(4);opacity:0}
}

.click-counter{
  font-size:11px;
  color:rgba(74,155,196,.4);
  letter-spacing:1.5px;
  margin-top:12px;
  opacity:0;
  animation:fadeIn 1s ease 1s forwards;
}

footer{
  font-size:11px;
  color:rgba(255,255,255,.25);
  letter-spacing:1px;
  padding-bottom:24px;
  opacity:0;
  animation:fadeIn 1s ease 1.1s forwards;
}

@keyframes fadeSlideDown{
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeSlideUp{
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeIn{
  to{opacity:1}
}
</style>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

var clicks = 0;
var countEl = document.getElementById('count');
document.querySelectorAll('.btn').forEach(function(btn) {
  btn.addEventListener('click', function(e) {
    var r = document.createElement('span');
    r.classList.add('ripple');
    var rect = this.getBoundingClientRect();
    var size = Math.max(rect.width, rect.height);
    r.style.width = r.style.height = size + 'px';
    r.style.left = (e.clientX - rect.left - size / 2) + 'px';
    r.style.top = (e.clientY - rect.top - size / 2) + 'px';
    this.appendChild(r);
    r.addEventListener('animationend', function() { r.remove(); });
    clicks++;
    countEl.textContent = clicks;
  });
});

(function() {
  var canvas = document.getElementById('particles');
  var ctx = canvas.getContext('2d');
  var w, h, particles = [];
  var colors = ['rgba(201,168,76,0.15)', 'rgba(74,155,196,0.15)', 'rgba(0,139,139,0.12)'];
  var COUNT = 55;
  var DIST = 130;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  for (var i = 0; i < COUNT; i++) {
    particles.push({
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      size: Math.random() * 2 + 1,
      color: colors[Math.floor(Math.random() * colors.length)]
    });
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0 || p.x > w) p.vx *= -1;
      if (p.y < 0 || p.y > h) p.vy *= -1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
      for (var j = i + 1; j < particles.length; j++) {
        var q = particles[j];
        var dx = p.x - q.x, dy = p.y - q.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < DIST) {
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(q.x, q.y);
          ctx.strokeStyle = 'rgba(74,155,196,' + (0.08 * (1 - dist / DIST)) + ')';
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
